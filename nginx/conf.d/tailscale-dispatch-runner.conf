# dispatch-runner — Tailscale HTTPS only
# https://corporatetraveldc-dispatch.taile57c8d.ts.net

server {
    listen 443 ssl;
    server_name corporatetraveldc-dispatch.taile57c8d.ts.net;

    ssl_certificate     /etc/nginx/ssl/tailscale-dispatch.crt;
    ssl_certificate_key /etc/nginx/ssl/tailscale-dispatch.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    server_name corporatetraveldc-dispatch.taile57c8d.ts.net;
    return 301 https://$host$request_uri;
}
