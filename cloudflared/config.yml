tunnel: 00000000-0000-0000-0000-cf0tunnel0000
credentials-file: /etc/cloudflared/00000000-0000-0000-0000-cf0tunnel0000.json

ingress:
  # dispatch — CF Access gated (Tailscale + auth required)
  - hostname: dispatch.example.com
    service: http://127.0.0.1:8000

  # ops — PWA frontend, open over tunnel
  - hostname: ops.example.com
    service: http://127.0.0.1:8000

  # dispatch-runner
  - hostname: dispatch-runner.example.com
    service: http://127.0.0.1:8001

  # openwebui — Open WebUI (Ollama chat frontend) — CF Access gated
  - hostname: openwebui.example.com
    service: http://127.0.0.1:3000

  # ollama — raw Ollama API — CF Access gated
  - hostname: ollama.example.com
    service: http://127.0.0.1:11434

  # adsb — UltraFeeder tar1090
  - hostname: adsb.example.com
    service: http://127.0.0.1:8080

  # acars — acarshub
  - hostname: acars.example.com
    service: http://127.0.0.1:9081

  # ntfy
  - hostname: ntfy.example.com
    service: http://127.0.0.1:2586

  # cockpit — system management UI — CF Access gated (Tailscale + auth required)
  - hostname: cockpit.example.com
    service: http://127.0.0.1:80
    originRequest:
      httpHostHeader: cockpit.example.com

  # pihole — CF Access gated (Tailscale + auth required)
  - hostname: pihole.example.com
    service: http://127.0.0.1:8091

  # apex and www — no content yet
  - hostname: example.com
    service: http_status:503
  - hostname: www.example.com
    service: http_status:503

  # catch-all
  - service: http_status:404
