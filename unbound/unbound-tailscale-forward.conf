# Tailscale MagicDNS — append to /etc/unbound/unbound.conf
#
# DNS flow after this change:
#   Client → Pi-hole :53 → Unbound :5335 → recursive (for public DNS)
#   Client → Pi-hole :53 → Unbound :5335 → 100.100.100.100 (for *.ts.net)
#
# resolv.conf stays immutable at 127.0.0.1 (Pi-hole).
# Tailscale does NOT manage resolv.conf:
#   sudo tailscale set --accept-dns=false
#
# ts.net. is marked domain-insecure because Tailscale's internal MagicDNS
# zones are not publicly DNSSEC-signed. Without this, Unbound's
# harden-dnssec-stripped: yes would reject unsigned internal responses.
# The domain-insecure directive covers all subdomains (tailnet-specific
# and device-specific) so no per-tailnet entries are needed.

server:
    domain-insecure: "ts.net."

forward-zone:
    name: "ts.net."
    forward-addr: 100.100.100.100
    forward-no-cache: no
