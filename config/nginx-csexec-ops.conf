# ops.example.com — CSEX Dispatch PWA (static HTML + API proxy)
#
# Serves:
#   /              → /var/www/corporatetraveldc-pwa/ (static PWA files)
#   /api/*         → http://127.0.0.1:8000 (corporatetraveldc-web FastAPI)
#   /healthz       → http://127.0.0.1:8000 (upstream health)
#
# Install:
#   sudo mkdir -p /var/www/corporatetraveldc-pwa
#   sudo cp /opt/corporatetraveldc/ctdi-dispatch-internal/src/pwa/index.html \
#           /var/www/corporatetraveldc-pwa/index.html
#   sudo cp /opt/corporatetraveldc/ctdi-dispatch-internal/config/nginx-csexec-ops.conf \
#           /etc/nginx/conf.d/csexec-ops.conf
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name ops.example.com;

    root /var/www/corporatetraveldc-pwa;
    index index.html;

    # Static PWA
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Content-Type-Options nosniff;
    }

    # API proxy — same-origin so the PWA can fetch /api/v1/* without CORS
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_buffering    off;
        proxy_cache        off;
    }

    # Health endpoint
    location = /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
        proxy_set_header Host $host;
    }

    # SSE event stream
    location = /api/v1/events {
        proxy_pass         http://127.0.0.1:8000/api/v1/events;
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
